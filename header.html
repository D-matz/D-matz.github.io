<httpProtocol>
    <customHeaders>
        <add name="Access-Control-Allow-Origin" value="*" />
    </customHeaders>
</httpProtocol>


<!DOCTYPE html>
<html>
<head>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
<script>
$(document).ready(function(){
  $("button").click(function(){
    var name = document.getElementById("input").value;
    var key = "RGAPI-6817416a-cd5c-4e62-aabc-294baa7d8b81";
  $.ajax({
      url: "https://na1.api.riotgames.com/lol/summoner/v4/summoners/by-name/"+name+"?api_key="+key,
      headers: {
        'Access-Control-Allow-Origin':'*',
        'Access-Control-Allow-Methods': 'GET',
        'Access-Control-Allow-Headers': 'Origin, Content-Type, X-Auth-Token',
        'Access-Control-Allow-Credentials': 'true'
      },
      type: "GET",
      dataType: "json",
      data: {
      },
      success: function (result) {
        document.getElementById("one").innerHTML = "result: "+result.id;
        document.getElementById("two").innerHTML = "result: "+result.name;
      },
      error: function () {
          console.log("error");
      }
  });
  });
});
</script>
</head>
<body>
<input type="text" id="input" value="">
<br>
<button>get summoner info</button>
<div id="one"></div>
<div id="two"></div>
</body>
</html>
